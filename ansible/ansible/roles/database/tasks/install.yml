- name: Create {{ database.compose_dir }} if it's not exists
  file:
    path: "{{ database.compose_dir }}"
    state: directory
    recurse: yes

- name: Create {{ database.compose_dir }}/docker-compose.yml file
  template:
    src: docker-compose.yml.j2
    dest: "{{ database.compose_dir }}/docker-compose.yml"

- name: Up DB service
  shell:
    cmd: docker-compose down && docker-compose up -d
    chdir: "{{ database.compose_dir }}"
