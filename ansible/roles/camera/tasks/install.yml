- name: Create {{ camera.compose_dir }} if it's not exists
  file:
    path: "{{ camera.compose_dir }}"
    state: directory
    recurse: yes

- name: Create {{ camera.compose_dir }}/docker-compose.yml file
  template:
    src: docker-compose.yml.j2
    dest: "{{ camera.compose_dir }}/docker-compose.yml"

- name: Up camera service
  shell:
    cmd: docker-compose up -d
    chdir: "{{ camera.compose_dir }}"