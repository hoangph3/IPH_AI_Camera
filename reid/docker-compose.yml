version: "3"

networks:
  mct-net:
    name: mct-net
    external: true

services:
  mct-reid:
    image: kotoracompany/mct-reid:0.1.0
    container_name: mct_reid
    volumes: 
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh

  mct-report:
    image: kotoracompany/mct-reid:0.1.0
    container_name: mct_report
    volumes: 
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: ["python3", "auto_stats.py"]

  mct-chroma:
    container_name: mct_chroma
    image: ghcr.io/chroma-core/chroma:latest
    restart: always
    # volumes:
    #   - ./volumes/chromadb:/chroma/chroma
    command: uvicorn chromadb.app:app --reload --workers 4 --host 0.0.0.0 --port 8000 --log-config chromadb/log_config.yml
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_AUTH_PROVIDER=${CHROMA_SERVER_AUTH_PROVIDER}
      - CHROMA_SERVER_AUTH_CREDENTIALS_FILE=${CHROMA_SERVER_AUTH_CREDENTIALS_FILE}
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_SERVER_AUTH_CREDENTIALS}
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=${CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER}
      - PERSIST_DIRECTORY=${PERSIST_DIRECTORY:-/chroma/chroma}
    ports:
      - '8000:8000'
    networks:
      - mct-net

  mct-mongodb:
    image: mongo:6.0.1
    container_name: mct_mongodb
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - mct-net
    volumes:
      - ./volumes/mongodb:/data/db
    restart: always

  mct-mongo-express:
    image: mongo-express:1.0.0-alpha
    container_name: mct_mongo_express
    restart: always
    ports:
      - 18081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mct-mongodb
    networks:
      - mct-net
  mct-prune-tracking:
    image: kotoracompany/mct-reid:0.1.0
    container_name: mct_prune_tracking
    volumes: 
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: ["python3", "auto_prune_tracking.py"]

  mct-prune_reid:
    image: kotoracompany/mct-reid:0.1.0
    container_name: mct_prune_tracking
    volumes: 
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: ["python3", "auto_prune_reid.py"]