version: "3"

networks:
  mct-net:
    name: mct-net
    external: true

services:
  mct-reid:
    image: kotoracompany/mct-reid:0.1.2
    container_name: mct_reid
    volumes:
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh

  mct-report:
    image: kotoracompany/mct-reid:0.1.2
    container_name: mct_report
    volumes:
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: ["python3", "auto_stats.py"]

  mct-prune-log:
    image: kotoracompany/mct-reid:0.1.2
    container_name: mct_prune_log
    volumes:
      - ./env:/app/env
    networks:
      - mct-net
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: ["python3", "auto_prune.py"]
